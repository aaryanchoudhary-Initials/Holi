<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holi Invitation 🌈</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    overflow:hidden;
    background: linear-gradient(120deg,#ff9a9e,#fad0c4,#fad0c4,#fbc2eb,#a6c1ee);
    background-size:400% 400%;
    animation:gradient 15s ease infinite;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    background:rgba(255,255,255,0.9);
    padding:30px 35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 35px rgba(0,0,0,0.2);
    width:90%;
    max-width:350px;
    backdrop-filter: blur(10px);
}

h1{
    margin-top:0;
    color:#333;
}

button{
    padding:12px 22px;
    margin:10px;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

#openBtn{
    background:#ff6f91;
    color:white;
}

#yesBtn{
    background:#28c76f;
    color:white;
    font-size:16px;
}

#noBtn{
    background:#ff4d4d;
    color:white;
}

.hidden{
    display:none;
}

#message{
    margin-top:15px;
    font-size:17px;
    line-height:1.5;
    color:#444;
}

/* floating particles */
.particle{
    position:absolute;
    border-radius:50%;
    opacity:0.6;
    animation: floatUp linear infinite;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh) scale(0.5);
    }
    to{
        transform:translateY(-10vh) scale(1.2);
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>🌈 Holi Invite</h1>

    <div id="start">
        <p>I made a tiny surprise for you</p>
        <button id="openBtn">Open Invitation</button>
    </div>

    <div id="question" class="hidden">
        <p>Will you come celebrate Holi with me on Wednesday? 🎨</p>
        <button id="yesBtn">Yes 😊</button>
        <button id="noBtn">No 🙃</button>
    </div>

    <div id="message" class="hidden">
        <h2>Yay! 🎉</h2>
        <p>
        I promise colors, music, sweets and laughter.<br><br>
        We’ll go early so you can still rest for work the next day 😌<br><br>
        I’ll take care of everything — you just bring your smile.<br><br>
        See you Wednesday 🌈
        </p>
    </div>
</div>

<script>

/* Open invitation */
document.getElementById("openBtn").onclick=function(){
    document.getElementById("start").classList.add("hidden");
    document.getElementById("question").classList.remove("hidden");
};

/* Yes click */
document.getElementById("yesBtn").onclick=function(){
    document.getElementById("question").classList.add("hidden");
    document.getElementById("message").classList.remove("hidden");
};

/* No click -> Yes grows forever */
let yesBtn=document.getElementById("yesBtn");
let size=16;

document.getElementById("noBtn").onclick=function(){
    size+=8;
    yesBtn.style.fontSize=size+"px";
    yesBtn.style.padding=(12+size/2)+"px "+(22+size/2)+"px";
};

/* floating Holi particles */
function createParticle(){
    const particle=document.createElement("div");
    particle.classList.add("particle");

    const size=Math.random()*12+6;
    particle.style.width=size+"px";
    particle.style.height=size+"px";

    const colors=["#ff4d6d","#ffd93d","#6bcB77","#4d96ff","#ff9f1c","#c77dff"];
    particle.style.background=colors[Math.floor(Math.random()*colors.length)];

    particle.style.left=Math.random()*100+"vw";
    particle.style.animationDuration=(5+Math.random()*6)+"s";

    document.body.appendChild(particle);

    setTimeout(()=>particle.remove(),11000);
}

setInterval(createParticle,200);

</script>

</body>
</html>
